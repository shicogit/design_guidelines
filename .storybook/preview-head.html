  @font-face { font-family: 'PolySans'; font-weight: 500; font-style: italic; font-display: swap; src: url('/fonts/polysans/PolySans-MedianItalic.woff2') format('woff2'); }

  /* Inline body-text link hover — light grey background on hover.
     Targets links with our standard inline pattern: color:inherit + text-decoration:underline. */
  a[style*="color: inherit"][style*="text-decoration: underline"]:hover {
    background-color: #DCDCE5;
    border-radius: 3px;
    transition: background-color 120ms;
  }
